<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Гъби и Гъбарски Приключения</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <header class="hero">
        <img src="images/header.jpg" class="hero-img">
    </header>

    <section class="search-section">
        <input id="searchBox" type="text" placeholder="Търси гъба...">
    </section>

    <section id="gallery" class="gallery"></section>

    <div id="pagination" class="pagination"></div>

    <div id="popup" class="popup hidden">
        <div class="popup-content">
            <span id="popupClose" class="close">&times;</span>
            <img id="popupImg">
            <h3 id="popupName"></h3>
            <p id="popupDesc" class="popup-scroll"></p>
        </div>
    </div>

    <!-- Firebase NON-MODULE SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firestore зареждане -->
    <script src="data.js"></script>

    <!-- Твоят UI код -->
    <script src="app.js"></script>
</body>
</html>
